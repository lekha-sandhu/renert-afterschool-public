{% extends "layout.html" %}

{% block head %}
    <head>

        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
        <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
        <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
        

    </head>

{% endblock %}

{% block content %}

<form action = "/report" method = "POST">

    <select class="form-control js-example-basic-single" name = "student">
        <option value="">Select a student</option>
        {% for s in student %}
            <option value="{{s.id}}">{{s.name}}</option>
        {% endfor %}
    </select>

    <br>
    <br>
    <br>

    <input type="month", name = "date"> </input>

    <br>
    <br>
    <br>

    <select class="form-control js-example-basic-single" name = "activity">
        <option value="">Select an activity</option>
        {% for a in activity %}
            <option value="{{a.afterschool_class_id}}">{{a.activity}}</option>
        {% endfor %}
    </select>
    
    <br>
    <br>
    <br>

    <button type="submit" class="btn btn-primary">View Report</button>

  </form>

    <script>
        $(document).ready(function() {
            $('.js-example-basic-single').select2();
        });
    </script>

{% endblock %}
