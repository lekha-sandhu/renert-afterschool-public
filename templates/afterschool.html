<style>

</style>

<html lang="en">
  
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SIGN IN</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  </head>  
  
  <body>
    <h1>SIGN IN SHEET FOR {{activity_name}}</h1>

    <div class="d-grid gap-2 col-6 mx-auto">
      <button type="button" class="btn btn-primary" onclick="window.location.href='http://localhost:5000/add_student';">ADD STUDENT</button>
    </div>
    
    <div class="a-grid gap-2 col-3">
      <table>
       <ul class="list-group">
          {% for x in students %}
                 <tr>
                      <td>
                       <li class="list-group-item">{{x.name}}</li>
                      </td>
               
                     <td>
                       <li class="list-group-item">{{x.teacher_name}}</li>
                     </td>
                  </tr>
            {% endfor %}
        </ul>
      </table>
    </div>



    <div class="alert alert-primary" role="alert">
      ** Student needs to go alert **
    </div>


    
    <button type="button" class="btn btn-primary">End of Class - Sign out Everyone</button>
  </body>


  
</html>
