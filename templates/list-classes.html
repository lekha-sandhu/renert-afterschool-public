<html>
    <head>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <style>
            table {
                border: 1px solid green;
                border-collapse: collapse;
                margin-top: 20px;
            }
            th, td {
                border: 1px solid white;
                padding: 10px;
                text-align: center;
            }
            th {
                background-color: white;
            }
            h1 {
                margin-bottom: 20px;
            }
            a {
                text-decoration: none;
                color: white;
            }
        </style>
    </head>

    <body class="container mt-4">
        <h1 class="text-center">Available Afterschool Classes</h1>

        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Activity</th>
                    <th>Weekdays</th>
                    <th>Instructor</th>
                    <th>Room</th>
                    <th>Grades</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for c in all_classes %}
                <tr>
                    <td>{{ c.afterschool_class_id }}</td>
                    <td>{{ c.activity }}</td>
                    <td>{{ c.weekdays }}</td>
                    <td>{{ c.instructor }}</td>
                    <td>{{ c.room }}</td>
                    <td>{{ c.grades }}</td>
                    <td>
                        <a href="/manage_class/{{ c.afterschool_class_id }}" class="btn btn-success btn-sm">
                            Manage Class
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </body>
</html>
